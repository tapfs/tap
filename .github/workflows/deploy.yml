name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths: [site/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx wrangler pages deploy site/ --project-name=tapfs --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f454c5bacc6b806c7aa3616d57aa3983
