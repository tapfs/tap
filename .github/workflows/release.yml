name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.binary }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tap-linux-x64
            features: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tap-darwin-x64
            features: "--no-default-features --features nfs"
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tap-darwin-arm64
            features: "--no-default-features --features nfs"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tap ${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x tap-*

      - uses: softprops/action-gh-release@v2
        with:
          files: tap-*
          generate_release_notes: true
