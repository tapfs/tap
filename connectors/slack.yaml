spec_version: "1"
description: "Slack — channels, messages, and team members"

name: slack
base_url: "https://slack.com/api"
auth:
  type: bearer
  token_env: SLACK_BOT_TOKEN
  setup_url: "https://api.slack.com/apps"
  setup_instructions: "Create a Slack app, add Bot Token scopes, install to workspace, copy Bot User OAuth Token"

capabilities:
  read: true
  write: false

agent:
  tips:
    - "Channel filenames use the channel name (e.g. general.md, engineering.md)"
    - "Messages use timestamps as filenames — grep for message content to find specific messages"
    - "User filenames use Slack usernames"
    - "Messages collection defaults to #general — edit list_endpoint to change the channel"

collections:
  - name: channels
    description: "Public and private Slack channels"
    slug_hint: "channel name (e.g. general, engineering)"
    operations: [read]
    list_endpoint: "/conversations.list?types=public_channel,private_channel&limit=200"
    get_endpoint: "/conversations.info?channel={id}"
    id_field: "id"
    slug_field: "name"
    title_field: "name"
    list_root: "channels"
    render:
      frontmatter:
        - name
        - "purpose.value as purpose"
        - "topic.value as topic"
        - num_members
        - is_private
        - is_archived
        - created
  - name: messages
    description: "Recent messages from a channel"
    slug_hint: "message timestamp (e.g. 1234567890.123456)"
    operations: [read]
    list_endpoint: "/conversations.history?channel=general&limit=50"
    get_endpoint: "/conversations.history?channel={id}&limit=1"
    id_field: "ts"
    slug_field: "ts"
    title_field: "text"
    list_root: "messages"
    render:
      frontmatter:
        - user
        - ts
        - type
      body: "text"
      sections:
        - name: Reactions
          field: "reactions"
          format: "list"
          item_template: ":{name}: ({count})"
  - name: users
    description: "Team members and their profiles"
    slug_hint: "username (e.g. jsmith)"
    operations: [read]
    list_endpoint: "/users.list?limit=200"
    get_endpoint: "/users.info?user={id}"
    id_field: "id"
    slug_field: "name"
    title_field: "real_name"
    list_root: "members"
    render:
      frontmatter:
        - "name as username"
        - real_name
        - "profile.title as title"
        - "profile.email as email"
        - "profile.status_text as status"
        - tz
        - is_admin
        - is_bot
