spec_version: "1"
version: "1.0.0"
description: "GitHub repositories, issues, pull requests, and notifications"

name: github
base_url: "https://api.github.com"
auth:
  type: oauth2
  token_env: GITHUB_TOKEN
  client_id: "Ov23liS2DRALKdevKymx"
  device_code_url: "https://github.com/login/device/code"
  token_url: "https://github.com/login/oauth/access_token"
  scopes: "repo read:org notifications read:user"
  setup_url: "https://github.com/settings/tokens"
  setup_instructions: "Or create a personal access token with 'repo' scope"

capabilities:
  read: true
  write: true
  create: true
  delete: false
  pagination: link_header
  rate_limit:
    requests_per_minute: 5000

agent:
  tips:
    - "Repos are grouped by org — navigate github/<org>/<repo>/issues/"
    - "Create issues under <org>/<repo>/issues/ e.g. tapfs/tap/issues/new-bug.md"
    - "Comments are a subcollection of each issue: <org>/<repo>/issues/<issue>/comments/"
    - "To find issues by label, grep for the Labels section"
    - "Notifications stays flat and cross-repo under notifications/"
  relationships:
    - "Pull requests reference issues via body text and timeline events"
    - "Issues and PRs share the same label and assignee sets"

collections:
  - name: repos
    description: "Git repositories accessible to the authenticated user"
    slug_hint: "repository name (e.g. tap, my-project)"
    operations: [read]
    list_endpoint: "/user/repos?sort=updated&per_page=100"
    get_endpoint: "/repos/{id}"
    id_field: "full_name"
    slug_field: "name"
    title_field: "name"
    group_by: "owner.login"
    render:
      frontmatter:
        - "full_name as name"
        - "owner.login as owner"
        - visibility
        - language
        - "stargazers_count as stars"
        - "forks_count as forks"
        - "open_issues_count as open_issues"
        - updated_at
      body: "description"
    subcollections:
      - name: issues
        parent_param: repo
        description: "GitHub issues with labels, assignees, and comments"
        slug_hint: "issue number (e.g. 42, 123)"
        operations: [read, write, create, draft]
        list_endpoint: "/repos/{repo}/issues?state=open&per_page=100"
        get_endpoint: "/repos/{repo}/issues/{id}"
        create_endpoint: "/repos/{repo}/issues"
        update_endpoint: "/repos/{repo}/issues/{id}"
        id_field: "number"
        slug_field: "number"
        title_field: "title"
        render:
          frontmatter:
            - title
            - state
            - "user.login as author"
            - "assignee.login as assignee"
            - created_at
            - updated_at
          body: "body"
          sections:
            - name: Labels
              field: "labels"
              format: "list"
              item_template: "{name}"
            - name: Assignees
              field: "assignees"
              format: "list"
              item_template: "{login}"
        operations_spec:
          - name: close
            description: "Close this issue"
            endpoint: "/repos/{repo}/issues/{id}"
            method: PATCH
            trigger: frontmatter
            trigger_field: state
            trigger_value: "closed"
            body: '{"state": "closed"}'
          - name: reopen
            description: "Reopen a closed issue"
            endpoint: "/repos/{repo}/issues/{id}"
            method: PATCH
            trigger: frontmatter
            trigger_field: state
            trigger_value: "open"
            body: '{"state": "open"}'
        subcollections:
          - name: comments
            parent_param: issue
            aggregate: true
            description: "Comments on a GitHub issue"
            slug_hint: "comment ID"
            operations: [read, create]
            list_endpoint: "/repos/{repo}/issues/{issue}/comments"
            get_endpoint: "/repos/{repo}/issues/{issue}/comments/{id}"
            create_endpoint: "/repos/{repo}/issues/{issue}/comments"
            update_endpoint: "/repos/{repo}/issues/{issue}/comments/{id}"
            id_field: "id"
            slug_field: "id"
            title_field: "user.login"
            render:
              frontmatter:
                - "user.login as author"
                - created_at
                - updated_at
              body: "body"

      - name: pulls
        parent_param: repo
        description: "Open pull requests with review status and CI checks"
        slug_hint: "PR number (e.g. 42, 123)"
        operations: [read, write, draft]
        list_endpoint: "/repos/{repo}/pulls?state=open&per_page=100"
        get_endpoint: "/repos/{repo}/pulls/{id}"
        update_endpoint: "/repos/{repo}/pulls/{id}"
        id_field: "number"
        slug_field: "number"
        title_field: "title"
        render:
          frontmatter:
            - title
            - state
            - "user.login as author"
            - "head.ref as branch"
            - "base.ref as target"
            - "mergeable_state as status"
            - created_at
            - updated_at
          body: "body"
          sections:
            - name: Labels
              field: "labels"
              format: "list"
              item_template: "{name}"
            - name: Reviewers
              field: "requested_reviewers"
              format: "list"
              item_template: "{login}"

  - name: notifications
    description: "Unread notifications across all repositories"
    slug_hint: "notification thread ID"
    operations: [read]
    list_endpoint: "/notifications?per_page=50"
    get_endpoint: "/notifications/threads/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "subject.title"

  - name: gists
    description: "Code snippets and notes"
    slug_hint: "gist ID (hash)"
    operations: [read]
    list_endpoint: "/gists?per_page=50"
    get_endpoint: "/gists/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "description"
