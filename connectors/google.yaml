# Google Workspace connector reference spec.
#
# This file documents the collections exposed by the Google Workspace
# connector. The connector does NOT use this YAML at runtime -- it talks
# directly to the Google APIs -- but the structure below mirrors the
# mapping for reference and tooling compatibility.

spec_version: "1"
description: "Google Workspace — Drive files, Gmail messages, and Calendar events"

name: google
base_url: "https://www.googleapis.com"
auth:
  type: bearer
  token_env: GOOGLE_ACCESS_TOKEN

capabilities:
  read: true
  write: true
  versions: false

agent:
  tips:
    - "Drive filenames use the document name (e.g. Budget 2026.md)"
    - "Gmail filenames use message IDs — grep for subjects to find specific emails"
    - "Calendar filenames use event IDs — grep for event summaries"
    - "This connector uses the native Google Workspace implementation, not the generic REST adapter"
  relationships:
    - "Drive files may be referenced in Calendar event descriptions"
    - "Gmail threads can contain Drive file links"

collections:
  - name: drive
    description: "Google Drive files and documents"
    slug_hint: "document name (e.g. Budget 2026, Meeting Notes)"
    operations: [read, write, draft]
    list_endpoint: "/drive/v3/files?fields=files(id,name,mimeType,modifiedTime)&q='root'+in+parents"
    get_endpoint: "/drive/v3/files/{id}?fields=*"
    update_endpoint: "/upload/drive/v3/files/{id}?uploadType=media"
    id_field: "id"
    slug_field: "name"
    title_field: "name"
    list_root: "files"

  - name: gmail
    description: "Gmail inbox messages"
    slug_hint: "message ID (opaque string)"
    operations: [read]
    list_endpoint: "/gmail/v1/users/me/messages?maxResults=50&labelIds=INBOX"
    get_endpoint: "/gmail/v1/users/me/messages/{id}?format=full"
    id_field: "id"
    slug_field: "id"
    list_root: "messages"

  - name: calendar
    description: "Google Calendar events"
    slug_hint: "event ID (opaque string)"
    operations: [read, write, draft]
    list_endpoint: "/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime"
    get_endpoint: "/calendar/v3/calendars/primary/events/{id}"
    update_endpoint: "/calendar/v3/calendars/primary/events/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "summary"
    list_root: "items"
