spec_version: "1"
description: "Stripe — customers, charges, subscriptions, and invoices"

name: stripe
base_url: "https://api.stripe.com"
auth:
  type: bearer
  token_env: STRIPE_API_KEY
  setup_url: "https://dashboard.stripe.com/apikeys"
  setup_instructions: "Copy your Secret key (starts with sk_)"

capabilities:
  read: true
  write: true

agent:
  tips:
    - "All filenames use Stripe IDs (e.g. cus_ABC123.md, ch_XYZ789.md)"
    - "Customer titles show email addresses"
    - "Invoice titles show invoice numbers"
    - "Stripe uses cursor-based pagination via the starting_after parameter"
  relationships:
    - "Charges and subscriptions belong to customers"
    - "Invoices are generated from subscriptions"

collections:
  - name: customers
    description: "Stripe customers with payment info and metadata"
    slug_hint: "Stripe customer ID (e.g. cus_ABC123)"
    operations: [read, write, draft]
    list_endpoint: "/v1/customers?limit=100"
    get_endpoint: "/v1/customers/{id}"
    update_endpoint: "/v1/customers/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "email"
    list_root: "data"
    render:
      frontmatter:
        - "id as customer_id"
        - email
        - name
        - phone
        - "currency as default_currency"
        - "balance as balance_cents"
        - delinquent
        - created
      body: "description"
    relationships:
      - target: charges
        type: one-to-many
        description: "Charges for this customer"
      - target: subscriptions
        type: one-to-many
        description: "Active subscriptions"
  - name: charges
    description: "Payment charges and transactions"
    slug_hint: "Stripe charge ID (e.g. ch_XYZ789)"
    operations: [read]
    list_endpoint: "/v1/charges?limit=100"
    get_endpoint: "/v1/charges/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "description"
    list_root: "data"
    render:
      frontmatter:
        - "id as charge_id"
        - "amount as amount_cents"
        - currency
        - status
        - paid
        - "payment_method_details.type as payment_method"
        - "billing_details.email as customer_email"
        - created
      body: "description"
  - name: subscriptions
    description: "Recurring subscriptions with billing details"
    slug_hint: "Stripe subscription ID (e.g. sub_DEF456)"
    operations: [read, write, draft]
    list_endpoint: "/v1/subscriptions?limit=100"
    get_endpoint: "/v1/subscriptions/{id}"
    update_endpoint: "/v1/subscriptions/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "id"
    list_root: "data"
    render:
      frontmatter:
        - "id as subscription_id"
        - status
        - "plan.interval as billing_interval"
        - "plan.amount as amount_cents"
        - "plan.currency as currency"
        - current_period_start
        - current_period_end
        - cancel_at_period_end
        - created
      sections:
        - name: Items
          field: "items.data"
          format: "list"
          item_template: "{price.product} — {price.unit_amount} {price.currency}/{price.recurring.interval}"
  - name: invoices
    description: "Invoices generated from subscriptions"
    slug_hint: "Stripe invoice ID (e.g. in_GHI012)"
    operations: [read]
    list_endpoint: "/v1/invoices?limit=100"
    get_endpoint: "/v1/invoices/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "number"
    list_root: "data"
    render:
      frontmatter:
        - number
        - status
        - "amount_due as amount_due_cents"
        - "amount_paid as amount_paid_cents"
        - currency
        - "customer_email as customer"
        - due_date
        - created
      sections:
        - name: Line Items
          field: "lines.data"
          format: "list"
          item_template: "{description} — {amount} {currency}"
