spec_version: "1"
description: "Salesforce CRM — accounts, opportunities, and sales data"

name: salesforce
base_url: "https://login.salesforce.com"
auth:
  type: bearer
  token_env: SF_ACCESS_TOKEN
  setup_url: "https://help.salesforce.com/s/articleView?id=sf.connected_app_create_api_integration.htm"
  setup_instructions: "Create a Connected App, then use your access token from Salesforce CLI: sf org login web"

capabilities:
  read: true
  write: true
  rate_limit:
    requests_per_minute: 100

agent:
  tips:
    - "Account filenames use slugified company names (e.g. acme-corp.md)"
    - "Opportunity filenames use deal names"
    - "SOQL queries in list_endpoint can be customized to filter results"
    - "Salesforce uses 18-character record IDs (e.g. 001xx00001ABC)"
  relationships:
    - "Accounts contain related opportunities and contacts"

collections:
  - name: accounts
    description: "CRM accounts (companies and organizations)"
    slug_hint: "company name (e.g. Acme Corp)"
    operations: [read, write, draft]
    list_endpoint: "/services/data/v59.0/query?q=SELECT+Id,Name,Industry,Type,Website,Phone,BillingCity,BillingState+FROM+Account+ORDER+BY+LastModifiedDate+DESC+LIMIT+200"
    get_endpoint: "/services/data/v59.0/sobjects/Account/{id}"
    update_endpoint: "/services/data/v59.0/sobjects/Account/{id}"
    id_field: "Id"
    slug_field: "Name"
    title_field: "Name"
    list_root: "records"
    render:
      frontmatter:
        - Name
        - Industry
        - Type
        - Website
        - Phone
        - "BillingCity as city"
        - "BillingState as state"
      body: "Description"
    relationships:
      - target: opportunities
        type: one-to-many
        description: "Sales opportunities for this account"
  - name: opportunities
    description: "Sales opportunities with stage and revenue tracking"
    slug_hint: "deal name (e.g. Q3 Renewal)"
    operations: [read, write, draft]
    list_endpoint: "/services/data/v59.0/query?q=SELECT+Id,Name,StageName,Amount,CloseDate,Probability,LeadSource+FROM+Opportunity+ORDER+BY+LastModifiedDate+DESC+LIMIT+200"
    get_endpoint: "/services/data/v59.0/sobjects/Opportunity/{id}"
    update_endpoint: "/services/data/v59.0/sobjects/Opportunity/{id}"
    id_field: "Id"
    slug_field: "Name"
    title_field: "Name"
    list_root: "records"
    render:
      frontmatter:
        - Name
        - StageName
        - Amount
        - CloseDate
        - Probability
        - LeadSource
      body: "Description"
    relationships:
      - target: accounts
        type: many-to-one
        description: "Parent account for this opportunity"
