spec_version: "1"
description: "Cloudflare — DNS zones, records, and Workers"

name: cloudflare
base_url: "https://api.cloudflare.com/client/v4"
auth:
  type: bearer
  token_env: CLOUDFLARE_TOKEN

capabilities:
  read: true
  write: true

agent:
  tips:
    - "Zone filenames use domain names (e.g. example.com.md)"
    - "DNS record filenames use Cloudflare record IDs"
    - "Workers are scoped to an account — edit list_endpoint with your account ID"
    - "DNS records are scoped to a zone — edit list_endpoint with your zone ID"
    - "All Cloudflare API responses wrap data in a 'result' envelope"
  relationships:
    - "DNS records belong to zones"
    - "Workers belong to accounts"

collections:
  - name: zones
    description: "DNS zones (domains) with status and configuration"
    slug_hint: "domain name (e.g. example.com)"
    operations: [read]
    list_endpoint: "/zones?per_page=50"
    get_endpoint: "/zones/{id}"
    id_field: "id"
    slug_field: "name"
    title_field: "name"
    list_root: "result"
    render:
      frontmatter:
        - name
        - status
        - "plan.name as plan"
        - type
        - name_servers
        - created_on
        - modified_on

  - name: dns_records
    description: "DNS records for a zone"
    slug_hint: "record ID"
    operations: [read, write, draft]
    list_endpoint: "/zones/YOUR_ZONE_ID/dns_records?per_page=100"
    get_endpoint: "/zones/YOUR_ZONE_ID/dns_records/{id}"
    update_endpoint: "/zones/YOUR_ZONE_ID/dns_records/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "name"
    list_root: "result"
    render:
      frontmatter:
        - "name as hostname"
        - type
        - content
        - ttl
        - proxied
        - created_on
        - modified_on

  - name: workers
    description: "Cloudflare Workers scripts"
    slug_hint: "worker script name"
    operations: [read]
    list_endpoint: "/accounts/YOUR_ACCOUNT_ID/workers/scripts"
    get_endpoint: "/accounts/YOUR_ACCOUNT_ID/workers/scripts/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "id"
    list_root: "result"
    render:
      frontmatter:
        - "id as name"
        - etag
        - modified_on
        - created_on
