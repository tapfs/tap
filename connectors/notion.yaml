spec_version: "1"
description: "Notion — pages, databases, and workspace content"

name: notion
base_url: "https://api.notion.com"
auth:
  type: bearer
  token_env: NOTION_API_TOKEN
  setup_url: "https://www.notion.so/my-integrations"
  setup_instructions: "Create an internal integration and copy the API key"

capabilities:
  read: true
  write: true
  create: true
  delete: true
  pagination: cursor

agent:
  tips:
    - "Page and database filenames use UUIDs — grep for titles to find specific content"
    - "The search endpoint returns both pages and databases mixed together"
    - "Page titles are nested at properties.title.title.0.plain_text"

collections:
  - name: pages
    description: "Notion pages accessible to the integration"
    slug_hint: "page UUID"
    operations: [read, write, create, delete, draft]
    list_endpoint: "/v1/search"
    get_endpoint: "/v1/pages/{id}"
    update_endpoint: "/v1/pages/{id}"
    create_endpoint: "/v1/pages"
    # Notion soft-deletes via PATCH archived: true rather than HTTP DELETE.
    delete_endpoint: "/v1/pages/{id}"
    delete_body: '{"archived": true}'
    id_field: "id"
    slug_field: "id"
    title_field: "properties.title.title.0.plain_text"
    list_root: "results"
    render:
      frontmatter:
        - "properties.title.title.0.plain_text as title"
        - "object as type"
        - "parent.type as parent_type"
        - "parent.database_id as database"
        - created_time
        - last_edited_time
        - "created_by.id as created_by"
        - "last_edited_by.id as edited_by"
        - archived
  - name: databases
    description: "Notion databases (structured collections)"
    slug_hint: "database UUID"
    operations: [read]
    list_endpoint: "/v1/search"
    get_endpoint: "/v1/databases/{id}"
    id_field: "id"
    slug_field: "id"
    title_field: "title.0.plain_text"
    list_root: "results"
    render:
      frontmatter:
        - "title.0.plain_text as title"
        - "object as type"
        - "parent.type as parent_type"
        - created_time
        - last_edited_time
        - archived
      body: "description.0.plain_text"
